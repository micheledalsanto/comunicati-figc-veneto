name: Build iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build
        run: |
          xcodebuild build \
            -project ComunicatiFIGC.xcodeproj \
            -scheme ComunicatiFIGC \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
